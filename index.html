<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Canetas de Insulina</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary: #007bff;
            --text-main: #333333;
            --border-color: #cccccc;
            --bg-readonly: #e9ecef;
            --danger: #dc3545;
            --danger-hover: #bd2130;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #222;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .calc-header {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.2fr 1.2fr;
            gap: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            padding: 0 10px;
            color: #555;
            font-size: 0.9rem;
        }

        .calc-row {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.2fr 1.2fr;
            gap: 12px;
            align-items: center;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 10px;
            margin-bottom: 12px;
        }

        .label-insulina {
            font-weight: bold;
            font-size: 1.1rem;
            color: #222;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input.input-expressao {
            text-align: left;
            font-weight: 500;
        }

        input.output-field {
            background-color: var(--bg-readonly);
            text-align: center;
            font-weight: bold;
            color: #333;
            border-color: #ddd;
        }

        .output-canetas {
            color: #28a745 !important;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn-clear {
            background-color: var(--danger);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-clear:hover {
            background-color: var(--danger-hover);
        }

        /* Responsividade para telas de celulares */
        @media (max-width: 600px) {
            .calc-header {
                display: none;
            }
            .calc-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 15px;
            }
            .label-insulina {
                border-bottom: 2px solid var(--primary);
                padding-bottom: 4px;
                margin-bottom: 4px;
            }
            .input-group-mobile {
                display: flex;
                flex-direction: column;
            }
            .input-group-mobile label {
                font-size: 0.8rem;
                color: #666;
                margin-bottom: 3px;
                font-weight: bold;
            }
            .actions {
                justify-content: center;
            }
            .btn-clear {
                width: 100%;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Insulina</h2>
    <p class="subtitle">Digite as doses (ex: 10+10+10). Pressione Enter para calcular e Enter novamente para mudar de linha.</p>

    <!-- Cabeçalho visível em computadores/tablets -->
    <div class="calc-header">
        <div>Tipo</div>
        <div>Doses (ex: 10+5+20)</div>
        <div style="text-align: center;">Total Diário</div>
        <div style="text-align: center;">Canetas/Mês</div>
    </div>

    <!-- Linha NPH -->
    <div class="calc-row">
        <div class="label-insulina">NPH</div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Doses:</label>
            <input type="text" class="input-expressao" id="input-nph" placeholder="Ex: 10+10+10" onkeydown="gerenciarEnter(event, 'nph', 'reg')">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Total Diário (UI):</label>
            <input type="text" class="output-field" id="total-nph" readonly value="0 UI">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Canetas/Mês:</label>
            <input type="text" class="output-field output-canetas" id="canetas-nph" readonly value="0">
        </div>
    </div>

    <!-- Linha Regular -->
    <div class="calc-row">
        <div class="label-insulina">Regular</div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Doses:</label>
            <input type="text" class="input-expressao" id="input-reg" placeholder="Ex: 5+5" onkeydown="gerenciarEnter(event, 'reg', null)">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Total Diário (UI):</label>
            <input type="text" class="output-field" id="total-reg" readonly value="0 UI">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Canetas/Mês:</label>
            <input type="text" class="output-field output-canetas" id="canetas-reg" readonly value="0">
        </div>
    </div>

    <div class="actions">
        <button class="btn-clear" onclick="limparTudo()">Limpar Campos</button>
    </div>
</div>

<script>
    // Armazena o estado para saber se o valor mudou desde o último cálculo
    const ultimosValores = { nph: "", reg: "" };

    function ajustarLabelsMoveis() {
        const labels = document.querySelectorAll('.show-mobile-only');
        if (window.innerWidth <= 600) {
            labels.forEach(l => l.style.display = 'block');
        } else {
            labels.forEach(l => l.style.display = 'none');
        }
    }
    window.addEventListener('resize', ajustarLabelsMoveis);
    window.addEventListener('DOMContentLoaded', ajustarLabelsMoveis);

    function gerenciarEnter(event, tipoAtual, proximoTipo) {
        if (event.key === 'Enter') {
            event.preventDefault(); // Evita comportamentos indesejados do form
            
            const inputElement = document.getElementById(`input-${tipoAtual}`);
            const valorAtual = inputElement.value.trim();

            // Se o valor na caixa mudou em relação ao que foi calculado por último, calcula primeiro
            if (valorAtual !== ultimosValores[tipoAtual]) {
                calcularLinha(tipoAtual);
                ultimosValores[tipoAtual] = valorAtual;
            } else {
                // Se o valor já estava calculado e ele apertou Enter de novo, pula para a próxima linha
                if (proximoTipo) {
                    document.getElementById(`input-${proximoTipo}`).focus();
                } else {
                    // Se for a última linha (Regular), tira o foco para fechar o teclado do celular
                    inputElement.blur();
                }
            }
        }
    }

    function obterQuantidadeCanetas(totalDiario) {
        if (totalDiario <= 0) return 0;
        return Math.ceil(totalDiario / 10);
    }

    function calcularLinha(tipo) {
        const inputVal = document.getElementById(`input-${tipo}`).value.trim();
        const totalField = document.getElementById(`total-${tipo}`);
        const canetasField = document.getElementById(`canetas-${tipo}`);

        if (!inputVal) {
            totalField.value = "0 UI";
            canetasField.value = "0";
            return;
        }

        const partes = inputVal.replace(/\s+/g, '').split('+');
        let soma = 0;

        for (let parte of partes) {
            if (parte) {
                const valor = parseFloat(parte);
                if (!isNaN(valor)) {
                    soma += valor;
                }
            }
        }

        const canetas = obterQuantidadeCanetas(soma);

        totalField.value = `${soma} UI`;
        canetasField.value = `${canetas} caneta${canetas !== 1 ? 's' : ''}`;
    }

    function limparTudo() {
        // Limpa os inputs de texto
        document.getElementById('input-nph').value = "";
        document.getElementById('input-reg').value = "";
        
        // Zera as saídas de texto
        document.getElementById('total-nph').value = "0 UI";
        document.getElementById('canetas-nph').value = "0";
        document.getElementById('total-reg').value = "0 UI";
        document.getElementById('canetas-reg').value = "0";

        // Limpa o histórico de verificação do Enter
        ultimosValores.nph = "";
        ultimosValores.reg = "";

        // Devolve o foco para o primeiro campo (NPH) para agilizar o próximo uso
        document.getElementById('input-nph').focus();
    }
</script>

</body>
</html>
