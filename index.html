<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Canetas de Insulina</title>
    <style>
        :root {
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-main: #333333;
            --border-color: rgba(0, 0, 0, 0.15);
            --bg-readonly: rgba(255, 255, 255, 0.8);
            
            /* Novo Verde Esmeralda Forte */
            --emerald: #00a86b;
            --emerald-hover: #008f5a;
            
            /* Novas cores das linhas ajustadas */
            --bg-nph: #94cccb;
            --letra-nph: #1c5655;
            --bg-reg: #f9c39a;
            --letra-reg: #d97930;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Nova imagem de fundo centralizada e cobrindo toda a tela */
            background: url("https://i.imgur.com/vjRX6iy.png") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(4px); /* Leve efeito de vidro fosco */
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #111;
            margin-bottom: 5px;
        }

        p.subtitle {
            text-align: center;
            color: #444;
            margin-bottom: 25px;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .calc-header {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.2fr 1.2fr;
            gap: 12px;
            font-weight: bold;
            margin-bottom: 8px;
            padding: 0 10px;
            color: #444;
            font-size: 0.9rem;
        }

        .calc-row {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.2fr 1.2fr;
            gap: 12px;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 8px;
            padding: 12px 10px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        /* Cores atualizadas das linhas */
        .row-nph {
            background-color: var(--bg-nph);
            color: #0b2e2d;
        }

        .row-reg {
            background-color: var(--bg-reg);
            color: #4a2304;
        }

        .label-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .letra-identificadora {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1;
            font-family: Arial, sans-serif;
        }

        .nph-identificador { color: var(--letra-nph); }
        .reg-identificador { color: var(--letra-reg); }

        .label-insulina {
            font-weight: bold;
            font-size: 1.15rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input.input-expressao {
            text-align: left;
            font-weight: 500;
            background-color: #ffffff;
            border-color: rgba(0,0,0,0.15);
        }

        input.output-field {
            background-color: var(--bg-readonly);
            text-align: center;
            font-weight: bold;
            color: #111;
            border-color: rgba(0,0,0,0.1);
        }

        .output-canetas {
            color: #0b5125 !important;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 15px;
        }

        /* Botão Verde Esmeralda Forte */
        .btn-clear {
            background-color: var(--emerald);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(0, 168, 107, 0.3);
        }

        .btn-clear:hover {
            background-color: var(--emerald-hover);
        }

        .btn-clear:active {
            transform: scale(0.98);
        }

        /* Responsividade para celulares */
        @media (max-width: 600px) {
            .calc-header {
                display: none;
            }
            .calc-row {
                grid-template-columns: 1fr;
                gap: 8px;
                padding: 15px;
            }
            .label-container {
                border-bottom: 2px solid rgba(0,0,0,0.1);
                padding-bottom: 6px;
                margin-bottom: 4px;
            }
            .input-group-mobile {
                display: flex;
                flex-direction: column;
            }
            .input-group-mobile label {
                font-size: 0.8rem;
                margin-bottom: 3px;
                font-weight: bold;
                color: inherit;
                opacity: 0.9;
            }
            .actions {
                justify-content: center;
            }
            .btn-clear {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Calculadora de Insulina</h2>
    <p class="subtitle">Digite as doses. Pressione Enter para somar e Enter novamente para mudar de linha.</p>

    <div class="calc-header">
        <div>Tipo</div>
        <div>Doses (ex: 10+5+20)</div>
        <div style="text-align: center;">Total Diário</div>
        <div style="text-align: center;">Canetas/Mês</div>
    </div>

    <!-- Linha NPH -->
    <div class="calc-row row-nph">
        <div class="label-container">
            <span class="letra-identificadora nph-identificador">N</span>
            <span class="label-insulina">NPH</span>
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Doses:</label>
            <input type="text" class="input-expressao" id="input-nph" placeholder="Ex: 10+10+10" enterkeyhint="next" onkeydown="gerenciarEnter(event, 'nph', 'reg')">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Total Diário:</label>
            <input type="text" class="output-field" id="total-nph" readonly value="0 UI">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Canetas/Mês:</label>
            <input type="text" class="output-field output-canetas" id="canetas-nph" readonly value="0">
        </div>
    </div>

    <!-- Linha Regular -->
    <div class="calc-row row-reg">
        <div class="label-container">
            <span class="letra-identificadora reg-identificador">R</span>
            <span class="label-insulina">Regular</span>
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Doses:</label>
            <input type="text" class="input-expressao" id="input-reg" placeholder="Ex: 5+5" enterkeyhint="done" onkeydown="gerenciarEnter(event, 'reg', null)">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Total Diário:</label>
            <input type="text" class="output-field" id="total-reg" readonly value="0 UI">
        </div>
        <div class="input-group-mobile">
            <label class="show-mobile-only" style="display:none;">Canetas/Mês:</label>
            <input type="text" class="output-field output-canetas" id="canetas-reg" readonly value="0">
        </div>
    </div>

    <div class="actions">
        <button class="btn-clear" onclick="limparTudo()">Limpar Campos</button>
    </div>
</div>

<script>
    let cliquesEnter = { nph: 0, reg: 0 };

    function ajustarLabelsMoveis() {
        const labels = document.querySelectorAll('.show-mobile-only');
        if (window.innerWidth <= 600) {
            labels.forEach(l => l.style.display = 'block');
        } else {
            labels.forEach(l => l.style.display = 'none');
        }
    }
    window.addEventListener('resize', ajustarLabelsMoveis);
    window.addEventListener('DOMContentLoaded', ajustarLabelsMoveis);

    document.getElementById('input-nph').addEventListener('input', () => cliquesEnter.nph = 0);
    document.getElementById('input-reg').addEventListener('input', () => cliquesEnter.reg = 0);

    function gerenciarEnter(event, tipoAtual, proximoTipo) {
        if (event.key === 'Enter') {
            event.preventDefault();
            
            cliquesEnter[tipoAtual]++;

            if (cliquesEnter[tipoAtual] === 1) {
                calcularLinha(tipoAtual);
            } else if (cliquesEnter[tipoAtual] >= 2) {
                cliquesEnter[tipoAtual] = 0;
                
                if (proximoTipo) {
                    const proxInput = document.getElementById(`input-${proximoTipo}`);
                    proxInput.focus();
                    proxInput.select();
                } else {
                    document.getElementById(`input-${tipoAtual}`).blur();
                }
            }
        }
    }

    function obterQuantidadeCanetas(totalDiario) {
        if (totalDiario <= 0) return 0;
        return Math.ceil(totalDiario / 10);
    }

    function calcularLinha(tipo) {
        const inputVal = document.getElementById(`input-${tipo}`).value.trim();
        const totalField = document.getElementById(`total-${tipo}`);
        const canetasField = document.getElementById(`canetas-${tipo}`);

        if (!inputVal) {
            totalField.value = "0 UI";
            canetasField.value = "0";
            return;
        }

        const partes = inputVal.replace(/\s+/g, '').split('+');
        let soma = 0;

        for (let parte of partes) {
            if (parte) {
                const valor = parseFloat(parte);
                if (!isNaN(valor)) {
                    soma += valor;
                }
            }
        }

        const canetas = obterQuantidadeCanetas(soma);
        totalField.value = `${soma} UI`;
        canetasField.value = `${canetas} caneta${canetas !== 1 ? 's' : ''}`;
    }

    function limparTudo() {
        document.getElementById('input-nph').value = "";
        document.getElementById('input-reg').value = "";
        
        document.getElementById('total-nph').value = "0 UI";
        document.getElementById('canetas-nph').value = "0";
        document.getElementById('total-reg').value = "0 UI";
        document.getElementById('canetas-reg').value = "0";

        cliquesEnter.nph = 0;
        cliquesEnter.reg = 0;

        document.getElementById('input-nph').focus();
    }
</script>

</body>
</html>
